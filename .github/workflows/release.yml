name: Claude release gate and Pages deploy

on:
  workflow_dispatch:
    inputs:
      model:
        description: Claude model used for the release review
        required: true
        default: claude-sonnet-5

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  release-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Claude release review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ inputs.model }}
        run: node scripts/run-claude-release-review.mjs

      - name: Preserve Claude verdict
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-release-verdict
          path: claude-release-verdict.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: release-gate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
